version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    restart: unless-stopped
    networks:
      - ollamito-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ollamito-nextjs
    ports:
      - "3000:3000"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - NODE_ENV=production
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ollamito-network

volumes:
  ollama_data:
    driver: local

networks:
  ollamito-network:
    driver: bridge